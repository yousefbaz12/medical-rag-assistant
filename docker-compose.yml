services:
  api:
    build: .
    container_name: medical-rag-api
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      - ./storage:/app/storage
    depends_on:
      - postgres
      - redis

  postgres:
    image: postgres:16
    container_name: medical-rag-postgres
    environment:
      POSTGRES_DB: medical_rag
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7
    container_name: medical-rag-redis
    ports:
      - "6379:6379"

volumes:
  postgres_data:
